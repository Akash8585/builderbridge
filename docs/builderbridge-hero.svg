<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-labelledby="title desc">
  <title id="title">BuilderBridge — from project risk to a reviewed action</title>
  <desc id="desc">
    Workflow: construction schedule, risk detected, AI agent reads live data and documents,
    exact-page citation, reviewable proposal, human confirmation, project update, activity log.
  </desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2336"/>
      <stop offset="100%" stop-color="#141c2b"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="560" rx="24" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="512" rx="18" fill="none" stroke="#1f2a3d" stroke-width="1"/>

  <rect x="48" y="48" width="10" height="46" rx="3" fill="url(#amber)"/>
  <text x="72" y="70" fill="#f8fafc" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">BuilderBridge</text>
  <text x="72" y="98" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16">From project risk to a reviewed action.</text>
  <text x="1152" y="68" text-anchor="end" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">Construction control room · human-confirmed AI writes</text>

  <!-- Row connectors -->
  <line x1="170" y1="210" x2="1030" y2="210" stroke="#334155" stroke-width="2"/>
  <line x1="170" y1="370" x2="1030" y2="370" stroke="#334155" stroke-width="2"/>
  <line x1="170" y1="210" x2="1030" y2="210" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 8" opacity="0.55"/>
  <line x1="170" y1="370" x2="1030" y2="370" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 8" opacity="0.55"/>

  <!-- Step 1 -->
  <g transform="translate(70,160)">
    <rect width="200" height="90" rx="12" fill="url(#card)" stroke="#2a364a"/>
    <circle cx="28" cy="28" r="10" fill="#1e293b" stroke="#64748b"/>
    <rect x="22" y="24" width="12" height="8" rx="1" fill="#94a3b8"/>
    <text x="50" y="32" fill="#e2e8f0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">1. Schedule</text>
    <text x="16" y="58" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Live critical path,</text>
    <text x="16" y="74" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">tasks and commitments</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(310,160)">
    <rect width="200" height="90" rx="12" fill="url(#card)" stroke="#2a364a"/>
    <circle cx="28" cy="28" r="10" fill="#3b2110" stroke="#f59e0b"/>
    <path d="M28 21 l5 10 h-10 z" fill="#f59e0b"/>
    <text x="50" y="32" fill="#e2e8f0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">2. Risk detected</text>
    <text x="16" y="58" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Slip, roadblock, or</text>
    <text x="16" y="74" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">open control item</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(550,160)">
    <rect width="200" height="90" rx="12" fill="url(#card)" stroke="#2a364a"/>
    <circle cx="28" cy="28" r="10" fill="#0f2744" stroke="#38bdf8"/>
    <circle cx="28" cy="28" r="3" fill="#38bdf8"/>
    <text x="50" y="32" fill="#e2e8f0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">3. Agent reads</text>
    <text x="16" y="58" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Live project data</text>
    <text x="16" y="74" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">+ uploaded documents</text>
  </g>

  <!-- Step 4 -->
  <g transform="translate(790,160)">
    <rect width="200" height="90" rx="12" fill="url(#card)" stroke="#2a364a"/>
    <circle cx="28" cy="28" r="10" fill="#10231a" stroke="#34d399"/>
    <text x="22" y="32" fill="#34d399" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="700">p.</text>
    <text x="50" y="32" fill="#e2e8f0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">4. Exact-page cite</text>
    <text x="16" y="58" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">File, page number,</text>
    <text x="16" y="74" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">and excerpt shown</text>
  </g>

  <!-- Step 5 -->
  <g transform="translate(70,320)">
    <rect width="200" height="90" rx="12" fill="url(#card)" stroke="#2a364a"/>
    <circle cx="28" cy="28" r="10" fill="#1e1b2e" stroke="#a78bfa"/>
    <rect x="22" y="23" width="12" height="10" rx="1.5" fill="none" stroke="#a78bfa"/>
    <text x="50" y="32" fill="#e2e8f0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">5. Proposal ready</text>
    <text x="16" y="58" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Changes, warnings,</text>
    <text x="16" y="74" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">and expected impact</text>
  </g>

  <!-- Step 6 — emphasized confirm step -->
  <g transform="translate(310,320)">
    <rect width="200" height="90" rx="12" fill="#1a2330" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="28" cy="28" r="10" fill="#3b2110" stroke="#f59e0b"/>
    <path d="M23 28 l3.5 3.5 7-7" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <text x="50" y="32" fill="#fde68a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">6. Human confirms</text>
    <text x="16" y="58" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">No silent writes —</text>
    <text x="16" y="74" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">explicit approval only</text>
  </g>

  <!-- Step 7 -->
  <g transform="translate(550,320)">
    <rect width="200" height="90" rx="12" fill="url(#card)" stroke="#2a364a"/>
    <circle cx="28" cy="28" r="10" fill="#0f2744" stroke="#60a5fa"/>
    <path d="M23 28 h10 M28 23 v10" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <text x="50" y="32" fill="#e2e8f0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">7. Record updated</text>
    <text x="16" y="58" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Schedule, RFI, or</text>
    <text x="16" y="74" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">commitment applied</text>
  </g>

  <!-- Step 8 -->
  <g transform="translate(790,320)">
    <rect width="200" height="90" rx="12" fill="url(#card)" stroke="#2a364a"/>
    <circle cx="28" cy="28" r="10" fill="#10231a" stroke="#34d399"/>
    <path d="M22 25 h12 M22 28.5 h12 M22 32 h8" stroke="#34d399" stroke-width="1.6" stroke-linecap="round"/>
    <text x="50" y="32" fill="#e2e8f0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">8. Activity logged</text>
    <text x="16" y="58" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Auditable trail of</text>
    <text x="16" y="74" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">the confirmed action</text>
  </g>

  <!-- Footer -->
  <rect x="48" y="456" width="1104" height="56" rx="12" fill="#0b1322" stroke="#243044"/>
  <circle cx="78" cy="484" r="5" fill="#f59e0b"/>
  <text x="96" y="478" fill="#e2e8f0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Review before write</text>
  <text x="96" y="498" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">Permission recheck · stale-data protection · atomic apply · activity history</text>
  <text x="1152" y="490" text-anchor="end" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">OpenAI Build Week</text>
</svg>
