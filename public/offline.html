<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — BuilderBridge</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8f9fa;
        color: #111111;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 40px 32px;
        max-width: 360px;
      }
      img { width: 64px; height: 64px; border-radius: 14px; margin-bottom: 16px; }
      h1 { font-size: 20px; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.02em; }
      p { font-size: 14px; color: #6b7280; line-height: 1.5; margin: 0 0 20px; }
      button {
        height: 40px;
        padding: 0 20px;
        border-radius: 8px;
        border: none;
        background: #111111;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icons/icon-192.png" alt="BuilderBridge" />
      <h1>You&rsquo;re offline</h1>
      <p>BuilderBridge needs a connection to load new pages. Check your signal and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
