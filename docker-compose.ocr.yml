services:
  builderbridge-ocr:
    build:
      context: ./ocr-worker
    environment:
      OCR_SERVICE_TOKEN: ${OCR_SERVICE_TOKEN:?Set OCR_SERVICE_TOKEN}
    ports:
      - "127.0.0.1:8010:8010"
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
