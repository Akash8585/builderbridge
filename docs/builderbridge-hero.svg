<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">BuilderBridge  from project risk to a reviewed action</title>
  <desc id="desc">
    Animated workflow: construction schedule, risk detected, AI agent reads live data and documents,
    exact-page citation, reviewable proposal, human confirmation, project update, activity log.
  </desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2336"/>
      <stop offset="100%" stop-color="#141c2b"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <style type="text/css"><![CDATA[
      .step { opacity: 0.78; }
      .step-label { fill: #cbd5e1; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 600; }
      .step-sub { fill: #94a3b8; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 11px; }
      .connector { stroke: #334155; stroke-width: 2; fill: none; stroke-linecap: round; }
      .pulse-dot { fill: #f59e0b; }
      .focus-ring { fill: none; stroke: #f59e0b; stroke-width: 2; opacity: 0; }

      @keyframes stepPulse {
        0%, 100% { opacity: 0.72; }
        10%, 18% { opacity: 1; }
      }
      @keyframes ringPulse {
        0%, 100% { opacity: 0; }
        10%, 18% { opacity: 0.9; }
      }
      @keyframes flow {
        0% { stroke-dashoffset: 120; opacity: 0.25; }
        50% { opacity: 0.85; }
        100% { stroke-dashoffset: 0; opacity: 0.35; }
      }
      @keyframes confirmGlow {
        0%, 55% { opacity: 0.45; }
        62%, 78% { opacity: 1; }
        100% { opacity: 0.55; }
      }
      @keyframes titleFade {
        0%, 100% { opacity: 0.92; }
        50% { opacity: 1; }
      }

      .s1 { animation: stepPulse 12s ease-in-out infinite; animation-delay: 0s; }
      .s2 { animation: stepPulse 12s ease-in-out infinite; animation-delay: 1.5s; }
      .s3 { animation: stepPulse 12s ease-in-out infinite; animation-delay: 3s; }
      .s4 { animation: stepPulse 12s ease-in-out infinite; animation-delay: 4.5s; }
      .s5 { animation: stepPulse 12s ease-in-out infinite; animation-delay: 6s; }
      .s6 { animation: confirmGlow 12s ease-in-out infinite; }
      .s7 { animation: stepPulse 12s ease-in-out infinite; animation-delay: 9s; }
      .s8 { animation: stepPulse 12s ease-in-out infinite; animation-delay: 10.5s; }

      .r1 { animation: ringPulse 12s ease-in-out infinite; animation-delay: 0s; }
      .r2 { animation: ringPulse 12s ease-in-out infinite; animation-delay: 1.5s; }
      .r3 { animation: ringPulse 12s ease-in-out infinite; animation-delay: 3s; }
      .r4 { animation: ringPulse 12s ease-in-out infinite; animation-delay: 4.5s; }
      .r5 { animation: ringPulse 12s ease-in-out infinite; animation-delay: 6s; }
      .r6 { animation: ringPulse 12s ease-in-out infinite; animation-delay: 7.5s; }
      .r7 { animation: ringPulse 12s ease-in-out infinite; animation-delay: 9s; }
      .r8 { animation: ringPulse 12s ease-in-out infinite; animation-delay: 10.5s; }

      .flow-line {
        stroke: url(#amber);
        stroke-width: 2.5;
        fill: none;
        stroke-linecap: round;
        stroke-dasharray: 8 10;
        animation: flow 3.5s linear infinite;
      }
      .brand { animation: titleFade 6s ease-in-out infinite; }

      @media (prefers-reduced-motion: reduce) {
        .s1, .s2, .s3, .s4, .s5, .s6, .s7, .s8,
        .r1, .r2, .r3, .r4, .r5, .r6, .r7, .r8,
        .flow-line, .brand {
          animation: none !important;
        }
        .step { opacity: 0.92 !important; }
        .focus-ring { opacity: 0 !important; }
        .flow-line { opacity: 0.55; stroke-dasharray: none; }
      }
    ]]></style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="560" rx="24" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="512" rx="18" fill="none" stroke="#1f2a3d" stroke-width="1"/>

  <!-- Brand header -->
  <g class="brand">
    <rect x="48" y="48" width="10" height="46" rx="3" fill="url(#amber)"/>
    <text x="72" y="70" fill="#f8fafc" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">BuilderBridge</text>
    <text x="72" y="98" fill="#94a3b8" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="16">From project risk to a reviewed action.</text>
  </g>

  <text x="1152" y="68" text-anchor="end" fill="#64748b" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="12">Construction control room ť human-confirmed AI writes</text>

  <!-- Flow connectors -->
  <path class="connector" d="M170 210 H1030"/>
  <path class="connector" d="M170 370 H1030"/>
  <path class="flow-line" d="M170 210 H1030"/>
  <path class="flow-line" d="M170 370 H1030" style="animation-delay:1.2s"/>

  <!-- Row 1: Schedule ť Risk ť Agent ť Citation -->
  <g class="step s1" transform="translate(70,160)" filter="url(#soft)">
    <rect class="focus-ring r1" x="-4" y="-4" width="208" height="98" rx="14"/>
    <rect width="200" height="90" rx="12" fill="url(#card)" stroke="#2a364a"/>
    <circle cx="28" cy="28" r="10" fill="#1e293b" stroke="#64748b"/>
    <rect x="22" y="24" width="12" height="8" rx="1" fill="#94a3b8"/>
    <text class="step-label" x="50" y="32">1. Schedule</text>
    <text class="step-sub" x="16" y="58">Live critical path,</text>
    <text class="step-sub" x="16" y="74">tasks &amp; commitments</text>
  </g>

  <g class="step s2" transform="translate(310,160)" filter="url(#soft)">
    <rect class="focus-ring r2" x="-4" y="-4" width="208" height="98" rx="14"/>
    <rect width="200" height="90" rx="12" fill="url(#card)" stroke="#2a364a"/>
    <circle cx="28" cy="28" r="10" fill="#3b2110" stroke="#f59e0b"/>
    <path d="M28 21 l5 10 h-10 z" fill="#f59e0b"/>
    <text class="step-label" x="50" y="32">2. Risk detected</text>
    <text class="step-sub" x="16" y="58">Slip, roadblock, or</text>
    <text class="step-sub" x="16" y="74">open control item</text>
  </g>

  <g class="step s3" transform="translate(550,160)" filter="url(#soft)">
    <rect class="focus-ring r3" x="-4" y="-4" width="208" height="98" rx="14"/>
    <rect width="200" height="90" rx="12" fill="url(#card)" stroke="#2a364a"/>
    <circle cx="28" cy="28" r="10" fill="#0f2744" stroke="#38bdf8"/>
    <circle cx="28" cy="28" r="3" fill="#38bdf8"/>
    <text class="step-label" x="50" y="32">3. Agent reads</text>
    <text class="step-sub" x="16" y="58">Live project data</text>
    <text class="step-sub" x="16" y="74">+ uploaded documents</text>
  </g>

  <g class="step s4" transform="translate(790,160)" filter="url(#soft)">
    <rect class="focus-ring r4" x="-4" y="-4" width="208" height="98" rx="14"/>
    <rect width="200" height="90" rx="12" fill="url(#card)" stroke="#2a364a"/>
    <circle cx="28" cy="28" r="10" fill="#10231a" stroke="#34d399"/>
    <text x="22" y="32" fill="#34d399" font-size="10" font-family="ui-sans-serif, system-ui, Segoe UI, sans-serif" font-weight="700">p.</text>
    <text class="step-label" x="50" y="32">4. Exact-page cite</text>
    <text class="step-sub" x="16" y="58">File, page number,</text>
    <text class="step-sub" x="16" y="74">and excerpt shown</text>
  </g>

  <!-- Row 2: Proposal ť Confirm ť Update ť Activity -->
  <g class="step s5" transform="translate(70,320)" filter="url(#soft)">
    <rect class="focus-ring r5" x="-4" y="-4" width="208" height="98" rx="14"/>
    <rect width="200" height="90" rx="12" fill="url(#card)" stroke="#2a364a"/>
    <circle cx="28" cy="28" r="10" fill="#1e1b2e" stroke="#a78bfa"/>
    <rect x="22" y="23" width="12" height="10" rx="1.5" fill="none" stroke="#a78bfa"/>
    <text class="step-label" x="50" y="32">5. Proposal ready</text>
    <text class="step-sub" x="16" y="58">Changes, warnings,</text>
    <text class="step-sub" x="16" y="74">and expected impact</text>
  </g>

  <g class="step s6" transform="translate(310,320)" filter="url(#soft)">
    <rect class="focus-ring r6" x="-4" y="-4" width="208" height="98" rx="14"/>
    <rect width="200" height="90" rx="12" fill="#1a2330" stroke="#f59e0b"/>
    <circle cx="28" cy="28" r="10" fill="#3b2110" stroke="#f59e0b"/>
    <path d="M23 28 l3.5 3.5 7-7" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <text class="step-label" x="50" y="32" fill="#fde68a">6. Human confirms</text>
    <text class="step-sub" x="16" y="58">No silent writes </text>
    <text class="step-sub" x="16" y="74">explicit approval only</text>
  </g>

  <g class="step s7" transform="translate(550,320)" filter="url(#soft)">
    <rect class="focus-ring r7" x="-4" y="-4" width="208" height="98" rx="14"/>
    <rect width="200" height="90" rx="12" fill="url(#card)" stroke="#2a364a"/>
    <circle cx="28" cy="28" r="10" fill="#0f2744" stroke="#60a5fa"/>
    <path d="M23 28 h10 M28 23 v10" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <text class="step-label" x="50" y="32">7. Record updated</text>
    <text class="step-sub" x="16" y="58">Schedule, RFI, or</text>
    <text class="step-sub" x="16" y="74">commitment applied</text>
  </g>

  <g class="step s8" transform="translate(790,320)" filter="url(#soft)">
    <rect class="focus-ring r8" x="-4" y="-4" width="208" height="98" rx="14"/>
    <rect width="200" height="90" rx="12" fill="url(#card)" stroke="#2a364a"/>
    <circle cx="28" cy="28" r="10" fill="#10231a" stroke="#34d399"/>
    <path d="M22 25 h12 M22 28.5 h12 M22 32 h8" stroke="#34d399" stroke-width="1.6" stroke-linecap="round"/>
    <text class="step-label" x="50" y="32">8. Activity logged</text>
    <text class="step-sub" x="16" y="58">Auditable trail of</text>
    <text class="step-sub" x="16" y="74">the confirmed action</text>
  </g>

  <!-- Footer emphasis -->
  <rect x="48" y="456" width="1104" height="56" rx="12" fill="#0b1322" stroke="#243044"/>
  <circle class="pulse-dot" cx="78" cy="484" r="5">
    <animate attributeName="opacity" values="0.35;1;0.35" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <text x="96" y="478" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Review before write</text>
  <text x="96" y="498" fill="#94a3b8" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="12">Permission recheck ť stale-data protection ť atomic apply ť activity history</text>
  <text x="1152" y="490" text-anchor="end" fill="#64748b" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="12">OpenAI Build Week</text>
</svg>
